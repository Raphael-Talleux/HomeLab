services:

  mariadb:
    build: ./mariaDB
    container_name: homelab-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      - ./.db-data:/var/lib/mysql/
    networks:
      - homelab-network

  adminer:
    build: ./adminer
    container_name: homelab-adminer
    restart: always
    networks:
      - homelab-network
    ports:
      - "8080:8080"
    depends_on:
      - mariadb


  # MTA server service running with postfix
  mta-server:
    build: ./mta-server
    container_name: mta_server
    environment:
      - MAIL_HOSTNAME=${MAIL_HOSTNAME}
    ports:
      - "25:25"    # SMTP
      - "587:587"  # SMTP Submission
    volumes:
      - ./mails-data:/home


#  imap-server:
#    build: ./imap-server
#    container_name: imap-server
#    ports:
#      - "993:993"  # IMAP
#    volumes:
#      - ./mails-data:/home



networks:
  homelab-network:
    driver: bridge