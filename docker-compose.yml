services:

  mariadb:
    build: ./mariaDB
    container_name: homelab-mariadb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./.db-data:/var/lib/mysql/
    networks:
      - homelab-network

  adminer:
    build: ./adminer
    container_name: homelab-adminer
    restart: always
    networks:
      - homelab-network
    ports:
      - "8080:8080"
    depends_on:
      - mariadb

  imap-server:
    build: ./imap-server
    container_name: homelab-imap-server
    restart: always
    networks:
      - homelab-network
    ports:
      - "143:143" # IMAP
      - "993:993" # IMAPS (TLS/SSL)
    depends_on:
      - mariadb


  # MTA server service running with postfix
  # mta-server:
  #   build: ./mta-server
  #   container_name: mta_server
  #   environment:
  #     - MAIL_HOSTNAME=${MAIL_HOSTNAME}
  #   ports:
  #     - "25:25"    # SMTP (intra-server)
  #     - "587:587"  # SMTP TLS/SSL (alt 465)
  #     - "143:143"  # IMAP
  #     - "993:993"  # IMAPS
  #   volumes:
  #     - ./.mails-data:/home


networks:
  homelab-network:
    driver: bridge